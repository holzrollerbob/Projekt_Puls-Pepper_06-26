services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache git &&
        git clone --depth=1 https://github.com/holzrollerbob/Projekt_Puls-Pepper_06-26 /tmp/site &&
        cp -r /tmp/site/index.html /tmp/site/impressum.html /tmp/site/datenschutz.html /usr/share/nginx/html/ &&
        cp -r /tmp/site/assets /usr/share/nginx/html/ &&
        nginx -g 'daemon off;'
