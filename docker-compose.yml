services:
  web:
    build: .
    restart: unless-stopped
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.puls-pepper.rule=Host(`srv1459016.hstgr.cloud`)"
      - "traefik.http.routers.puls-pepper.entrypoints=web"
      - "traefik.http.services.puls-pepper.loadbalancer.server.port=80"

networks:
  traefik_default:
    external: true
